name: portfolio-dev

networks:
  internal:
    driver: bridge

volumes:
  postgres_data_dev:
  strapi_uploads:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: strapi_dev
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    build:
      context: ./strapi-cms
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_URL: postgresql://strapi:strapi@postgres:5432/strapi_dev
      APP_KEYS: ${STRAPI_APP_KEYS}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
    volumes:
      - ./strapi-cms:/opt/app
      - /opt/app/node_modules
      - strapi_uploads:/opt/app/public/uploads
    ports:
      - "1337:1337"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1337/_health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  portfolio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      strapi:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_STRAPI_API_URL: http://localhost:1337
      STRAPI_INTERNAL_URL: http://strapi:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - internal
